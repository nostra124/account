name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# `pull-requests: write` lets the post-failure step
# (tests/ci-post-failure.sh) leave a comment on the PR containing
# the failing job's log tail. The agent that maintains this repo
# reads PR comments via the GitHub MCP server but cannot download
# workflow logs, so this is the channel for failure context. See
# skills/testing.md.
permissions:
  contents: read
  pull-requests: write

jobs:
  # BUG-005: guard against the `unkown` typo (and other common
  # misspellings) regressing into bin/account. Cheap grep step
  # runs before the bats job so a typo PR fails fast.
  lint:
    name: lint (typos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for known typos
        run: |
          if grep -nE '\bunkown\b' bin/account; then
            echo "::error::found 'unkown' (should be 'unknown') in bin/account"
            exit 1
          fi
      # BUG-004: .rpk/version must equal the latest entry in
      # .rpk/versions (the TSV release ledger). Catches the case
      # where a release bump updates one file but not the other.
      - name: Check .rpk/version matches ledger head
        run: |
          version=$(cat .rpk/version)
          ledger=$(tail -1 .rpk/versions | awk '{print $1}')
          if [ "$version" != "$ledger" ]; then
            echo "::error::.rpk/version ($version) != .rpk/versions head ($ledger)"
            exit 1
          fi

  unit:
    name: unit (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats
      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          bats tests/unit/*.bats 2>&1 | tee ${{ runner.temp }}/unit.log
      - name: Post failure to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: tests/ci-post-failure.sh "${{ runner.temp }}/unit.log" "unit (linux)"

  # FEAT-208: confirm the ACCOUNT_HOME_OVERRIDE path keeps the
  # sandboxed $HOME intact when bin/account runs under EUID==0.
  # Without this job, the 8 affected tests would only ever run as
  # the non-root GitHub Actions user.
  unit-root:
    name: unit (linux, root)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats
      - name: Run unit tests as root
        shell: bash
        run: |
          set -o pipefail
          sudo --preserve-env=PATH bats tests/unit/*.bats 2>&1 \
            | tee ${{ runner.temp }}/unit-root.log
      - name: Post failure to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: tests/ci-post-failure.sh "${{ runner.temp }}/unit-root.log" "unit (linux, root)"

  # FEAT-212: exercise the pure-bash subset of bin/account on a
  # Darwin kernel. Catches GNU vs BSD utility differences (e.g.
  # `stat -c` vs `stat -f`, `tr` collation classes) before they
  # surface on a user's machine.
  #
  # continue-on-error while we hunt the specific failure. The
  # Post-failure step uploads the bats output to a PR comment so
  # the maintaining agent can read it without log-download access.
  unit-macos:
    name: unit (macos)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: brew install bats-core
      - name: Diagnostics
        run: |
          uname -a
          bash --version | head -1
          bats --version
          which gpg ssh-keygen hostname tr sed grep || true
      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          bats --print-output-on-failure tests/unit/*.bats 2>&1 \
            | tee ${{ runner.temp }}/unit-macos.log
      - name: Post failure to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: tests/ci-post-failure.sh "${{ runner.temp }}/unit-macos.log" "unit (macos)"

  sit-linux:
    name: sit (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - ubuntu:latest
          - debian:stable-slim
          - fedora:latest
          - archlinux:latest
          - alpine:latest
    steps:
      - uses: actions/checkout@v4
      - name: Run depends-script SIT in ${{ matrix.image }}
        env:
          SIT_ENGINE: docker
          SIT_IMAGES: ${{ matrix.image }}
        shell: bash
        run: |
          set -o pipefail
          tests/sit/run.sh 2>&1 | tee ${{ runner.temp }}/sit.log
      - name: Post failure to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: tests/ci-post-failure.sh "${{ runner.temp }}/sit.log" "sit (${{ matrix.image }})"

  sit-darwin:
    name: sit (darwin)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run depends-script SIT on darwin
        shell: bash
        run: |
          set -o pipefail
          {
            fail=0
            for name in gpg openssh rpk; do
              echo "::group::depends/$name"
              if ! sh tests/sit/runner.sh "$name"; then
                echo "::error::depends/$name failed on darwin"
                fail=$((fail + 1))
              fi
              echo "::endgroup::"
            done
            [ "$fail" -eq 0 ] || exit 1
          } 2>&1 | tee ${{ runner.temp }}/sit-darwin.log
      - name: Post failure to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: tests/ci-post-failure.sh "${{ runner.temp }}/sit-darwin.log" "sit (darwin)"
